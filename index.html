<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Senseii Hybrid Tutor</title>
                <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
                        <link rel="manifest" href="manifest.json">
                            <meta name="apple-mobile-web-app-capable" content="yes">
                                <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
                                    <style>
                                            body { background-color: #1A1A1E; color: #EAEAEA; font-family: system-ui, sans-serif; }
                                                    .purple-border { border: 1px solid #8A2BE2; }
                                                            .purple-bg { background-color: #8A2BE2; }
                                                                    .dark-input { background-color: #25252B; color: #FFFFFF; }

                                                                                    audio::-webkit-media-controls-panel { background-color: #25252B; }
                                                                                            audio::-webkit-media-controls-current-time-display,
                                                                                                    audio::-webkit-media-controls-time-remaining-display { color: #FFFFFF; }
                                                                                                        </style>
                                                                                                        </head>
                                                                                                        <body class="p-4 max-w-lg mx-auto">

                                                                                                            <header class="text-center my-6">
                                                                                                                    <h1 class="text-3xl font-bold text-white">🇳🇬 Senseii Hybrid Tutor</h1>
                                                                                                                            <p class="text-gray-400 text-sm">Study With Accent Presets or Your Cloned Voice</p>
                                                                                                                                </header>

                                                                                                                                    <div class="bg-[#25252B] p-4 rounded-xl mb-6 purple-border">
                                                                                                                                            <h3 class="text-sm font-semibold mb-2 text-purple-400">🔑 Secure Key Vault (Saved Locally)</h3>
                                                                                                                                                    <div class="space-y-2">
                                                                                                                                                                <input type="password" id="geminiKeyField" class="w-full p-2 text-xs rounded dark-input border border-gray-700 focus:outline-none" placeholder="Paste Gemini key (AIzaSyBFPms4fFcrVPlcYwz3zu9fo0nzGgLDpfQ))" onchange="saveKeys()">
                                                                                                                                                                            <input type="password" id="falKeyField" class="w-full p-2 text-xs rounded dark-input border border-gray-700 focus:outline-none" placeholder="Paste Fal.ai API Key (863f7919-e673-4a8f-8860-098f9b7fbee1:793466980058c207f087c9e127c5267e)" onchange="saveKeys()">
                                                                                                                                                                                    </div>
                                                                                                                                                                                        </div><div class="bg-[#25252B] p-4 rounded-xl mb-6 border border-gray-700">
                                                                                                                                                                                                    <h3 class="text-sm font-semibold mb-2 text-purple-400">🎛️ Connectivity Control</h3>
                                                                                                                                                                                                            <div class="flex gap-4">
                                                                                                                                                                                                                        <label class="flex items-center gap-2 cursor-pointer">
                                                                                                                                                                                                                                        <input type="radio" name="networkMode" value="online" checked onclick="toggleMode('online')"> 
                                                                                                                                                                                                                                                        <span>🌐 Online Mode</span>
                                                                                                                                                                                                                                                                    </label>
                                                                                                                                                                                                                                                                                <label class="flex items-center gap-2 cursor-pointer">
                                                                                                                                                                                                                                                                                                <input type="radio" name="networkMode" value="offline" onclick="toggleMode('offline')"> 
                                                                                                                                                                                                                                                                                                                <span>🔌 Offline Mode</span>
                                                                                                                                                                                                                                                                                                                            </label>
                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                            <div class="mb-4">
                                                                                                                                                                                                                                                                                                                                                    <div class="flex border-b border-gray-700 mb-4">
                                                                                                                                                                                                                                                                                                                                                                <button id="tab-text" class="flex-1 py-2 text-center tab-active font-medium" onclick="switchTab('text')">✍️ Text / Status</button>
                                                                                                                                                                                                                                                                                                                                                                            <button id="tab-pdf" class="flex-1 py-2 text-center text-gray-400 font-medium" onclick="switchTab('pdf')">📄 Documents</button>
                                                                                                                                                                                                                                                                                                                                                                                        <button id="tab-img" class="flex-1 py-2 text-center text-gray-400 font-medium" onclick="switchTab('img')">📸 Pictures</button>
                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                        <div id="panel-text" class="block space-y-2">
                                                                                                                                                                                                                                                                                                                                                                                                                    <textarea id="notesInput" class="w-full h-40 p-3 rounded-lg dark-input purple-border focus:outline-none" placeholder="Pasted text, extracted PDFs, or document analysis summaries will display here automatically..."></textarea>
                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="processingStatus" class="text-xs text-purple-300 font-medium italic"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="panel-pdf" class="hidden">
                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="border-2 border-dashed border-gray-600 rounded-lg p-6 text-center cursor-pointer hover:border-purple-500">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <input type="file" id="documentFile" accept=".pdf,.txt,.docx" class="hidden" onchange="handleDocumentUpload(event)">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <label for="documentFile" class="cursor-pointer text-gray-400 block w-full h-full">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <span>Tap to upload PDF, Word (.docx), or Text document</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div id="panel-img" class="hidden">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="border-2 border-dashed border-gray-600 rounded-lg p-6 text-center cursor-pointer hover:border-purple-500">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="file" id="imgFile" accept="image/*" capture="environment" class="hidden" onchange="handleImageUpload(event)">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <label for="imgFile" class="cursor-pointer text-gray-400 block w-full h-full">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <span>📸 Take a photo or choose an image file</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="bg-[#25252B] p-4 rounded-xl mb-6 purple-border space-y-4">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label class="block text-xs font-semibold text-gray-400 mb-1">TUTOR PERSONA</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <select id="persona" class="w-full p-2 rounded dark-input border border-gray-700">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option>Normal Tone</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option>Strict Nigerian Lecturer Mode</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option>Big Brother/Sister Encouragement</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <label class="block text-xs font-semibold text-gray-400 mb-1">VOICE CONFIGURATION</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <select id="voiceChoice" class="w-full p-2 rounded dark-input border border-gray-700 mb-2" onchange="toggleVoiceFields()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="senseii">🎙️ Use Senseii's Custom Voice Model</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="preset-idera">YarnGPT Preset: Idera (Female)</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="preset-jude">YarnGPT Preset: Jude (Male)</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="preset-chinenye">YarnGPT Preset: Chinenye (Female)</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="preset-tayo">YarnGPT Preset: Tayo (Male)</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="clone">✨ Upload a different custom voice</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </select>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div id="cloneVoiceUploadSection" class="hidden mt-3 p-3 bg-[#1A1A1E] rounded-lg border border-purple-900 space-y-2">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <label class="block text-[11px] font-bold text-purple-400">🎤 STEP 1: UPLOAD REFERENCE AUDIO SAMPLE (10 Seconds)</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <input type="file" id="voiceSampleFile" accept="audio/*" class="w-full text-xs text-gray-400 dark-input p-1 rounded">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button class="w-full purple-bg text-white font-bold py-3 px-4 rounded-xl shadow-lg transition transform active:scale-95 mb-4" onclick="startLearning()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                🚀 Start Learning Session
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div id="audioOutputDeck" class="hidden bg-[#25252B] p-4 rounded-xl mb-6 border border-purple-500 text-center space-y-2">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <span class="text-xs font-bold text-purple-300 block">🎧 Senseii Audio Lesson Ready</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <audio id="audioPlayer" controls class="w-full mt-1"></audio>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="bg-[#25252B] p-4 rounded-xl mb-6 border border-gray-700">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <h3 class="text-sm font-semibold mb-2 text-purple-400">📖 True Offline Dictionary</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <input type="text" id="dictInput" class="w-full p-2 rounded dark-input border border-gray-700 mb-2" placeholder="Type a tricky word..." oninput="lookupWord()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div id="dictStatus" class="text-[10px] text-purple-300 mb-1 italic"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="dictOutput" class="text-xs text-gray-400 italic max-h-32 overflow-y-auto"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="border-t border-gray-800 pt-4">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <h3 class="text-lg font-bold text-white mb-2">💬 Ask Senseii</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="flex gap-2">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="text" id="chatInput" class="flex-1 p-3 rounded-lg dark-input purple-border focus:outline-none" placeholder="Ask to simplify a concept...">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="purple-bg px-4 rounded-lg font-bold" onclick="sendChat()">Ask</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="chatResponse" class="mt-3 text-sm text-gray-300 p-3 bg-[#25252B] rounded-lg hidden"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // --- SENSEII VOICE MODEL PATH SPECIFICATION ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // REPLACE THIS URL with your live 10-second voice sample audio link once uploaded
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const SENSEII_PERMANENT_AUDIO_URL = "https://your-domain-or-github-pages.com/senseii-voice-sample.mp3";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             document.getElementById("geminiKeyField").value = localStorage.getItem("SENSEII_GEMINI_KEY") || "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     document.getElementById("falKeyField").value = localStorage.getItem("SENSEII_FAL_KEY") || "";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             function saveKeys() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         localStorage.setItem("SENSEII_GEMINI_KEY", document.getElementById("geminiKeyField").value.trim());
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     localStorage.setItem("SENSEII_FAL_KEY", document.getElementById("falKeyField").value.trim());
