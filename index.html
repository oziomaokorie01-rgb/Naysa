<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senseii Hybrid Tutor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { background-color: #1A1A1E; color: #EAEAEA; font-family: system-ui, sans-serif; }
        .purple-border { border: 1px solid #8A2BE2; }
        .purple-bg { background-color: #8A2BE2; }
        .dark-input { background-color: #25252B; color: #FFFFFF; }
        .tab-active { border-bottom: 2px solid #8A2BE2; color: #8A2BE2; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="text-center my-6">
        <h1 class="text-3xl font-bold text-white">🇳🇬 Senseii Hybrid Tutor</h1>
        <p class="text-gray-400 text-sm">Study Smarter, Anywhere</p>
    </header>

    <!-- MAIN INTERACTION TABS -->
    <div class="mb-4">
        <div class="flex border-b border-gray-700 mb-4 text-xs font-medium overflow-x-auto whitespace-nowrap">
            <button id="tab-text" class="flex-1 py-2 px-2 text-center tab-active" onclick="switchTab('text')">✍️ Text</button>
            <button id="tab-pdf" class="flex-1 py-2 px-2 text-center text-gray-400" onclick="switchTab('pdf')">📄 Docs</button>
            <button id="tab-img" class="flex-1 py-2 px-2 text-center text-gray-400" onclick="switchTab('img')">📸 Pictures</button>
        </div>

        <div id="panel-text" class="block space-y-2">
            <textarea id="notesInput" class="w-full h-40 p-3 rounded-lg dark-input purple-border focus:outline-none text-sm" placeholder="Your loaded notes, extracted text, or transcriptions will appear here..."></textarea>
            <div id="processingStatus" class="text-xs text-purple-300 font-medium italic"></div>
        </div>

        <!-- HIGH-RESPONSIVE NATIVE ACCESSIBLE INPUT PANELS (FIXES MOBILE BUTTONS) -->
        <div id="panel-pdf" class="hidden">
            <div class="bg-[#25252B] p-6 rounded-lg border border-gray-700 text-center space-y-3">
                <span class="text-xs text-gray-400 block">Select a PDF or Plaintext document from your storage:</span>
                <input type="file" id="documentFile" accept=".pdf,.txt" class="w-full text-xs text-gray-300 dark-input p-2 rounded border border-gray-700" onchange="handleDocumentUpload(event)">
            </div>
        </div>

        <div id="panel-img" class="hidden">
            <div class="bg-[#25252B] p-6 rounded-lg border border-gray-700 text-center space-y-3">
                <span class="text-xs text-gray-400 block">📸 Snap study papers or upload images:</span>
                <input type="file" id="imgFile" accept="image/*" capture="environment" class="w-full text-xs text-gray-300 dark-input p-2 rounded border border-gray-700" onchange="handleImageUpload(event)">
            </div>
        </div>
    </div>

    <!-- VOICE SETTINGS -->
    <div class="bg-[#25252B] p-4 rounded-xl mb-6 purple-border space-y-3">
        <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1">TUTOR PERSONA</label>
            <select id="persona" class="w-full p-2 rounded dark-input border border-gray-700 text-sm">
                <option>Normal Tone</option>
                <option>Strict Nigerian Lecturer Mode</option>
                <option>Big Brother/Sister Encouragement</option>
            </select>
        </div>
    </div>

    <button class="w-full purple-bg text-white font-bold py-3 px-4 rounded-xl shadow-lg transition transform active:scale-95 mb-4" onclick="startLearningSession()">
        🚀 Start Voice Lesson
    </button>

    <!-- NATIVE AUDIO CONTROL INTERFACE -->
    <div id="audioOutputDeck" class="hidden bg-[#25252B] p-4 rounded-xl mb-6 border-2 border-green-500 text-center space-y-3">
        <span class="text-xs font-bold text-green-400 block">🗣️ Senseii Audio Engine Active</span>
        <div class="flex justify-center gap-2">
            <button onclick="pauseSpeech()" class="bg-yellow-600 hover:bg-yellow-700 text-white font-bold text-xs px-4 py-2 rounded-lg shadow">⏸️ Pause</button>
            <button onclick="resumeSpeech()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-4 py-2 rounded-lg shadow">▶️ Resume</button>
            <button onclick="stopSpeech()" class="bg-red-600 hover:bg-red-700 text-white font-bold text-xs px-4 py-2 rounded-lg shadow">🛑 Stop</button>
        </div>
    </div>

    <!-- TRUE OFFLINE DICTIONARY -->
    <div class="bg-[#25252B] p-4 rounded-xl mb-6 border border-gray-700">
        <h3 class="text-sm font-semibold mb-2 text-purple-400">📖 True Offline Dictionary</h3>
        <input type="text" id="dictInput" class="w-full p-2 rounded dark-input border border-gray-700 mb-2" placeholder="Type a tricky word..." oninput="lookupWord()">
        <div id="dictStatus" class="text-[10px] text-purple-300 mb-1 italic"></div>
        <div id="dictOutput" class="text-xs text-gray-400 italic max-h-32 overflow-y-auto"></div>
    </div>

    <!-- ASK SENSEII CHAT PANEL -->
    <div class="border-t border-gray-800 pt-4">
        <h3 class="text-lg font-bold text-white mb-2">💬 Ask Senseii</h3>
        <div class="flex gap-2">
            <input type="text" id="chatInput" class="flex-1 p-3 rounded-lg dark-input purple-border focus:outline-none" placeholder="Ask to simplify a concept...">
            <button class="purple-bg px-4 rounded-lg font-bold text-sm text-white" onclick="sendChat()">Ask</button>
        </div>
        <div id="chatResponse" class="mt-3 text-sm text-gray-300 p-3 bg-[#25252B] rounded-lg hidden"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let synth = window.speechSynthesis;
        let currentUtterance = null;

        function switchTab(tab) {
            ['text', 'pdf', 'img'].forEach(t => {
                document.getElementById(`panel-${t}`).className = 'hidden';
                document.getElementById(`tab-${t}`).className = 'flex-1 py-2 text-center text-gray-400';
            });
            document.getElementById(`panel-${tab}`).className = 'block space-y-2';
            document.getElementById(`tab-${tab}`).className = 'flex-1 py-2 text-center tab-active';
        }

        async function handleDocumentUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const status = document.getElementById("processingStatus");
            const notesInput = document.getElementById("notesInput");
            status.innerText = `⏳ Local extraction of ${file.name}...`;
            switchTab('text');

            if (file.name.endsWith('.pdf')) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let extractedText = "";
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        extractedText += textContent.items.map(item => item.str).join(" ") + "\n";
                    }
                    notesInput.value = extractedText;
                    status.innerText = `✅ PDF text layers extracted successfully!`;
                } catch (err) {
                    status.innerText = "❌ Local browser engine failed to parse PDF layers.";
                }
            } else {
                const reader = new FileReader();
                reader.onload = function(e) {
                    notesInput.value = e.target.result;
                    status.innerText = "✅ Plaintext file loaded successfully!";
                };
                reader.readAsText(file);
            }
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const status = document.getElementById("processingStatus");
            status.innerText = "⏳ Running image analysis...";
            switchTab('text');

            try {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onloadend = async function() {
                    const base64Data = reader.result.split(',')[1];
                    
                    const response = await fetch('/api/chat', {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            promptText: "Extract and read all plain text visible inside this picture verbatim perfectly.",
                            inlineData: { mimeType: file.type || "image/jpeg", data: base64Data }
                        })
                    });
                    const data = await response.json();
                    if(data.candidates?.[0]?.content?.parts?.[0]?.text) {
                        document.getElementById("notesInput").value = data.candidates[0].content.parts[0].text;
                        status.innerText = "✅ Image scanned successfully!";
                    } else {
                        status.innerText = `❌ Error: ${data.error || "Unable to interpret image text."}`;
                    }
                };
            } catch(e) {
                status.innerText = "❌ Image analysis channel failure.";
            }
        }

        function startLearningSession() {
            const text = document.getElementById('notesInput').value.trim();
            if(!text) return alert("Abeg drop text notes or load documents first!");
            
            synth.cancel();
            
            const persona = document.getElementById("persona").value;
            let introPrefix = "";
            if(persona === "Strict Nigerian Lecturer Mode") introPrefix = "Look at your notes and listen closely o! ";
            if(persona === "Big Brother/Sister Encouragement") introPrefix = "Relax your mind, you go pass this exam sharp-sharp. ";
            
            currentUtterance = new SpeechSynthesisUtterance(introPrefix + text);
            currentUtterance.rate = 0.95;
            
            document.getElementById("audioOutputDeck").classList.remove("hidden");
            synth.speak(currentUtterance);
        }

        function pauseSpeech() { if (synth.speaking && !synth.paused) synth.pause(); }
        function resumeSpeech() { if (synth.paused) synth.resume(); }
        function stopSpeech() { synth.cancel(); document.getElementById("audioOutputDeck").classList.add("hidden"); }

        let db;
        const dbStatus = document.getElementById("dictStatus");
        const dbRequest = window.indexedDB.open("SenseiiCompleteDB", 1);
        dbRequest.onupgradeneeded = function(e) {
            db = e.target.result;
            db.createObjectStore("dictionary", { keyPath: "word" });
        };
        dbRequest.onsuccess = function(e) {
            db = e.target.result;
            seedData();
        };

        async function seedData() {
            const tx = db.transaction(["dictionary"], "readwrite");
            const store = tx.objectStore("dictionary");
            const words = {
                "cataplexy": "A sudden, temporary loss of muscle function or control, typically precipitated by sudden intense emotional responses such as laughter, surprise, or anger.",
                "cough": "To suddenly expel air from the lungs with a sharp, harsh noise, often to clear the throat or air passages.",
                "narcolepsy": "A chronic neurological disorder affecting brain control over sleep-wake cycles."
            };
            Object.keys(words).forEach(w => store.put({ word: w, definition: words[w] }));
            dbStatus.innerText = "🔌 True Offline Matrix Ready!";
        }

        function lookupWord() {
            const word = document.getElementById('dictInput').value.toLowerCase().trim();
            const out = document.getElementById('dictOutput');
            if(!word) { out.innerText = ""; return; }
            const store = db.transaction(["dictionary"], "readonly").objectStore("dictionary");
            const req = store.get(word);
            req.onsuccess = function() {
                out.innerHTML = req.result ? `<strong>Definition:</strong> ${req.result.definition}` : "Term not found in fast offline matrices.";
            };
        }

        async function sendChat() {
            const query = document.getElementById('chatInput').value.trim();
            const responseBox = document.getElementById('chatResponse');

            if(!query) return;

            responseBox.classList.remove('hidden');
            responseBox.innerHTML = "💡 <em>Senseii processing query via secure server...</em>";

            try {
                const context = document.getElementById('notesInput').value.trim();
                
                const response = await fetch('/api/chat', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ context: context, query: query })
                });
                
                const data = await response.json();
                if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
                    responseBox.innerHTML = `<strong>Senseii Response:</strong><br>${data.candidates[0].content.parts[0].text}`;
                } else if (data.error) {
                    responseBox.innerHTML = `❌ <strong>API Rejection:</strong> ${data.error}`;
                } else {
                    responseBox.innerHTML = "❌ Failed to parse backend content parameters.";
                }
            } catch(e) {
                responseBox.innerHTML = "Connection timeout reaching the server pipeline.";
            }
        }
    </script>
</body>
</html>
