<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Senseii Hybrid Tutor</title>
                <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
                    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
                        <link rel="manifest" href="manifest.json">
                            <meta name="apple-mobile-web-app-capable" content="yes">
                                <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
                                    <style>
                                            body { background-color: #1A1A1E; color: #EAEAEA; font-family: system-ui, sans-serif; }
                                                    .purple-border { border: 1px solid #8A2BE2; }
                                                            .purple-bg { background-color: #8A2BE2; }
                                                                    .dark-input { background-color: #25252B; color: #FFFFFF; }
                                                                            .tab-active { border-bottom: 2px solid #8A2BE2; color: #8A2BE2; }
                                                                                </style>
                                                                                </head>
                                                                                <body class="p-4 max-w-lg mx-auto">
                                                                                   <header class="text-center my-6">
                                                                                            <h1 class="text-3xl font-bold text-white">🇳🇬 Senseii Hybrid Tutor</h1>
                                                                                                    <p class="text-gray-400 text-sm">Study With Accent Presets or Your Cloned Voice</p>
                                                                                                        </header>

                                                                                                            <div class="bg-[#25252B] p-4 rounded-xl mb-6 purple-border">
                                                                                                                    <h3 class="text-sm font-semibold mb-2 text-purple-400">🎛️ Connectivity Control</h3>
                                                                                                                            <div class="flex gap-4">
                                                                                                                                        <label class="flex items-center gap-2 cursor-pointer">
                                                                                                                                                        <input type="radio" name="networkMode" value="online" checked onclick="toggleMode('online')"> 
                                                                                                                                                                        <span>🌐 Online Mode</span>
                                                                                                                                                                                    </label>
                                                                                                                                                                                                <label class="flex items-center gap-2 cursor-pointer">
                                                                                                                                                                                                                <input type="radio" name="networkMode" value="offline" onclick="toggleMode('offline')"> 
                                                                                                                                                                                                                                <span>🔌 Offline Mode</span>
                                                                                                                                                                                                                                            </label>
                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                            <div class="mb-4">
                                                                                                                                                                                                                                                                    <div class="flex border-b border-gray-700 mb-4">
                                                                                                                                                                                                                                                                                <button id="tab-text" class="flex-1 py-2 text-center tab-active font-medium" onclick="switchTab('text')">✍️ Text</button>
                                                                                                                                                                                                                                                                                            <button id="tab-pdf" class="flex-1 py-2 text-center text-gray-400 font-medium" onclick="switchTab('pdf')">📄 PDF</button>
                                                                                                                                                                                                                                                                                                        <button id="tab-img" class="flex-1 py-2 text-center text-gray-400 font-medium" onclick="switchTab('img')">📸 Picture</button>
                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                        <div id="panel-text" class="block">
                                                                                                                                                                                                                                                                                                                                    <textarea id="notesInput" class="w-full h-40 p-3 rounded-lg dark-input purple-border focus:outline-none" placeholder="Paste your pharmacy or computer science chapters here..."></textarea>
                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                    <div id="panel-pdf" class="hidden">
                                                                                                                                                                                                                                                                                                                                                                <div class="border-2 border-dashed border-gray-600 rounded-lg p-6 text-center cursor-pointer hover:border-purple-500">
                                                                                                                                                                                                                                                                                                                                                                                <input type="file" id="pdfFile" accept=".pdf" class="hidden" onchange="triggerConfetti()">
                                                                                                                                                                                                                                                                                                                                                                                                <label for="pdfFile" class="cursor-pointer text-gray-400">Tap to upload study PDF document</label>
                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                            <div id="panel-img" class="hidden">
                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="border-2 border-dashed border-gray-600 rounded-lg p-6 text-center cursor-pointer hover:border-purple-500">
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="file" id="imgFile" accept="image/*" capture="environment" class="hidden" onchange="triggerConfetti()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label for="imgFile" class="cursor-pointer text-gray-400">📸 Take snapshot of textbook page</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="bg-[#25252B] p-4 rounded-xl mb-6 purple-border space-y-4">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label class="block text-xs font-semibold text-gray-400 mb-1">TUTOR PERSONA</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <select id="persona" class="w-full p-2 rounded dark-input border border-gray-700" onchange="triggerConfetti()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option>Normal Tone</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option>Strict Nigerian Lecturer Mode</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option>Big Brother/Sister Encouragement</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <label class="block text-xs font-semibold text-gray-400 mb-1">VOICE CONFIGURATION</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <select id="voiceChoice" class="w-full p-2 rounded dark-input border border-gray-700" onchange="triggerConfetti()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="preset-idera">YarnGPT Preset: Idera (Female)</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="preset-jude">YarnGPT Preset: Jude (Male)</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="preset-chinenye">YarnGPT Preset: Chinenye (Female)</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="preset-tayo">YarnGPT Preset: Tayo (Male)</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="clone">✨ Use Cloned Audio Track</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div><button class="w-full purple-bg text-white font-bold py-3 px-4 rounded-xl shadow-lg transition transform active:scale-95 mb-6" onclick="startLearning()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            🚀 Start Learning Session
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="bg-[#25252B] p-4 rounded-xl mb-6 border border-gray-700">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <h3 class="text-sm font-semibold mb-2 text-purple-400">📖 True Offline Dictionary</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="text" id="dictInput" class="w-full p-2 rounded dark-input border border-gray-700 mb-2" placeholder="Type a tricky word..." oninput="lookupWord()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="dictStatus" class="text-[10px] text-purple-300 mb-1 italic"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div id="dictOutput" class="text-xs text-gray-400 italic max-h-32 overflow-y-auto"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div><div class="border-t border-gray-800 pt-4">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <h3 class="text-lg font-bold text-white mb-2">💬 Ask Senseii</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="flex gap-2">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <input type="text" id="chatInput" class="flex-1 p-3 rounded-lg dark-input purple-border focus:outline-none" placeholder="Ask to simplify a concept...">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button class="purple-bg px-4 rounded-lg font-bold" onclick="sendChat()">Ask</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div id="chatResponse" class="mt-3 text-sm text-gray-300 p-3 bg-[#25252B] rounded-lg hidden"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div><script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // --- API KEY DESIGNATION ARRAYS ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const GEMINI_API_KEY = "AIzaSyBFPms4fFcrVPlcYwz3zu9fo0nzGgLDpfQ";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const FAL_AI_API_KEY = "863f7919-e673-4a8f-8860-098f9b7fbee1:793466980058c207f087c9e127c5267e";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Global Purple Confetti Logic
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function triggerConfetti() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    confetti({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    particleCount: 80,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    spread: 60,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    origin: { y: 0.8 },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    colors: ['#8A2BE2', '#9D4EDD', '#C77DFF']
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.body.addEventListener('click', (e) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        triggerConfetti();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Tab View Controls
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function switchTab(tab) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ['text', 'pdf', 'img'].forEach(t => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById(`panel-${t}`).className = 'hidden';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById(`tab-${t}`).className = 'flex-1 py-2 text-center text-gray-400 font-medium';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById(`panel-${tab}`).className = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById(`tab-${tab}`).className = 'flex-1 py-2 text-center tab-active font-medium';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Connectivity Management States
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let globalMode = 'online';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function toggleMode(mode) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        globalMode = mode;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const chatInput = document.getElementById('chatInput');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (mode === 'offline') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                alert("🔌 Offline System Active. Cloned voices disabled. Local browser rendering engine enabled.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                chatInput.placeholder = "Chat requires cloud connection...";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                chatInput.disabled = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            } else {
